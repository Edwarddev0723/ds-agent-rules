name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Lint sync.sh
        run: shellcheck sync.sh
      - name: Lint new-project.sh
        run: shellcheck new-project.sh
      - name: Lint docs-build.sh
        run: shellcheck docs-build.sh

  lint-snippets:
    name: Snippet Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate snippet format
        run: make lint-snippets

  test:
    name: Bats Tests
    runs-on: ubuntu-latest
    needs: [lint, lint-snippets]
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local
      - name: Run tests
        run: bats tests/

  test-macos:
    name: Bats Tests (macOS)
    runs-on: macos-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: brew install bats-core
      - name: Run tests
        run: bats tests/
